# =====================================
# SERVER
# =====================================
server.port=8080
server.error.include-message=always

# =====================================
# APPLICATION
# =====================================
spring.application.name=centralized-health-card-backend

# =====================================
# DATABASE
# =====================================
spring.datasource.url=jdbc:mysql://localhost:3306/health_card_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================
# JPA / HIBERNATE
# =====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================
# FILE UPLOAD
# =====================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================
# MAIL CONFIGURATION
# =====================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================================
# JWT
# =====================================
app.jwt.secret=${JWT_SECRET:c2VjdXJlLWNlbnRyYWxpemVkLWhlYWx0aC1jYXJkLXN5c3RlbS1qd3Qtc2VjcmV0LWtleS1taW4tMjU2LWJpdHM=}
app.jwt.access-token-expiration-ms=86400000
app.jwt.refresh-token-expiration-ms=604800000

# =====================================
# CORS
# =====================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# =====================================
# NOTIFICATIONS
# =====================================
app.notifications.sms.enabled=false
app.notifications.email.enabled=true

# =====================================
# FILE STORAGE
# =====================================
app.file-storage.upload-dir=./uploads/lab-reports

# =====================================
# FRONTEND
# =====================================
app.frontend.base-url=${FRONTEND_URL:http://localhost:5173}

# =====================================
# SPRINGDOC / SWAGGER
# =====================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# =====================================
# LOGGING
# =====================================
logging.level.com.healthcard.backend=INFO
logging.level.org.springframework.security=WARN